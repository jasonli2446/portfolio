<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D OS</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/windows.css">
  <link rel="stylesheet" href="css/dock.css">
  <link rel="stylesheet" href="css/apps.css">
</head>
<body>
  <!-- The room: perspective container = viewport = front face of box -->
  <div id="room">
    <div id="box">
      <div class="wall wall-back">
        <div id="menubar"></div>
        <div id="desktop-icons"></div>
      </div>
      <div class="wall wall-left"></div>
      <div class="wall wall-right"></div>
      <div class="wall wall-floor"></div>
      <div class="wall wall-ceiling"></div>
    </div>
  </div>

  <!-- Intro / boot screen -->
  <div id="boot-screen">
    <div class="boot-content">
      <img class="boot-logo" src="public/headshot.jpg" alt="Jason Li">
      <div class="boot-name">Jason Li</div>
      <div class="boot-subtitle">3D Portfolio</div>
      <div class="boot-camera-prompt">
        <p class="boot-camera-text">Enable camera for head-tracking parallax?</p>
        <div class="boot-camera-buttons">
          <button class="boot-btn boot-btn-primary" id="boot-enable-camera">Enable Camera</button>
          <button class="boot-btn boot-btn-secondary" id="boot-skip-camera">Skip</button>
        </div>
        <p class="boot-camera-hint">You can toggle this anytime from the menu bar</p>
      </div>
    </div>
  </div>

  <!-- Dock (viewport overlay) -->
  <div id="dock"></div>

  <!-- Context menu -->
  <div id="context-menu"></div>

  <!-- Ambient particles -->
  <canvas id="particles"></canvas>

  <!-- Overlay UI -->
  <div id="status">Loading face tracking model...</div>
  <div id="webcam-container">
    <video id="webcam" autoplay playsinline muted></video>
  </div>
  <div id="debug"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
