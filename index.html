<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D OS</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/windows.css">
  <link rel="stylesheet" href="css/dock.css">
  <link rel="stylesheet" href="css/apps.css">
</head>
<body>
  <!-- The room: perspective container = viewport = front face of box -->
  <div id="room">
    <div id="box">
      <div class="wall wall-back">
        <div id="menubar"></div>
        <div id="desktop-icons"></div>
        <div id="dock"></div>
      </div>
      <div class="wall wall-left"></div>
      <div class="wall wall-right"></div>
      <div class="wall wall-floor"></div>
      <div class="wall wall-ceiling"></div>
    </div>
  </div>

  <!-- Boot screen -->
  <div id="boot-screen">
    <div class="boot-logo">JL</div>
    <div class="boot-bar"><div class="boot-bar-fill"></div></div>
  </div>

  <!-- Context menu -->
  <div id="context-menu"></div>

  <!-- Ambient particles -->
  <canvas id="particles"></canvas>

  <!-- Overlay UI -->
  <div id="status">Loading face tracking model...</div>
  <div id="webcam-container">
    <video id="webcam" autoplay playsinline muted></video>
  </div>
  <div id="debug"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
